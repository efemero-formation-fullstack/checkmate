- name: Missing max_players in tournament must fail
  request:
    url: http://localhost:8080/tournament
    method: POST
    headers:
      Authorization: "bearer {test_admin_token:s}"
      Content-type: application/json
    json:
      $ext:
        function: tests.tavern.utils:invalid_tournament_missing_max_players
  response:
    status_code: 400
